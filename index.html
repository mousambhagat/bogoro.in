<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wayhaven — Carry your world in style.</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Barlow', sans-serif; background: #111; color: #fff; }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem 1.5rem 1.5rem;
      overflow: hidden;
    }

    /* Background as <img> — most reliable cross-browser */
    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }

    /* Dark overlay */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(8, 5, 2, 0.60);
      z-index: 1;
    }

    .hero > *:not(.hero-bg):not(.hero-overlay) { position: relative; z-index: 2; }

    .logo {
      width: 190px;
      height: 190px;
      object-fit: contain;
      margin-bottom: 0.5rem;
    }

    .wordmark {
      font-family: 'Freestyle Script', 'Brush Script MT', cursive;
      font-weight: 400;
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
      margin-bottom: 0.6rem;
      text-shadow: 0 2px 40px rgba(0,0,0,0.6);
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 300;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }

    .launch-btn {
      display: inline-block;
      border: 2px solid #E8930A;
      border-radius: 100px;
      padding: 0.7rem 2.4rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 1rem;
      background: transparent;
    }

    .brand-sub {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 1.2rem;
    }

    .email-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 0.5rem;
    }

    .email-input {
      flex: 1;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 100px;
      padding: 0.9rem 1.5rem;
      font-size: 0.95rem;
      color: #fff;
      font-family: 'Barlow', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .email-input::placeholder { color: rgba(255,255,255,0.45); }
    .email-input:focus { border-color: #E8930A; }

    .notify-btn {
      background: #E8930A;
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 0.9rem 1.8rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .notify-btn:hover { background: #c47800; transform: scale(1.03); }

    .form-note {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 1rem;
    }

    .success-msg {
      display: none;
      color: #E8930A;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    footer {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    @media (max-width: 480px) {
      .email-row { flex-direction: column; }
      .notify-btn { width: 100%; padding: 1rem; }
    }
  </style>
</head>
